<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Cookie base - warm golden brown -->
  <circle cx="16" cy="16" r="15" fill="#C8722A"/>
  <!-- Cookie texture / lighter center -->
  <circle cx="16" cy="16" r="13" fill="#D4873A"/>
  <!-- Slight highlight top -->
  <ellipse cx="13" cy="11" rx="5" ry="3" fill="#E09B4A" opacity="0.45"/>
  <!-- Chocolate chips -->
  <ellipse cx="11" cy="13" rx="2.2" ry="1.8" fill="#3D1F0A" transform="rotate(-15 11 13)"/>
  <ellipse cx="19" cy="11" rx="2" ry="1.7" fill="#3D1F0A" transform="rotate(10 19 11)"/>
  <ellipse cx="14" cy="20" rx="2.1" ry="1.8" fill="#3D1F0A" transform="rotate(-8 14 20)"/>
  <ellipse cx="21" cy="19" rx="1.9" ry="1.6" fill="#3D1F0A" transform="rotate(12 21 19)"/>
  <ellipse cx="10" cy="20" rx="1.7" ry="1.5" fill="#3D1F0A" transform="rotate(-5 10 20)"/>
  <!-- Cookie cracks / texture lines -->
  <path d="M13 15 Q16 13 19 16" stroke="#B5651D" stroke-width="0.8" fill="none" opacity="0.6"/>
  <path d="M12 18 Q15 19 17 17" stroke="#B5651D" stroke-width="0.7" fill="none" opacity="0.5"/>
  <!-- Outer edge shadow -->
  <circle cx="16" cy="16" r="15" fill="none" stroke="#8B4513" stroke-width="1.2" opacity="0.4"/>
  <!-- Letter M subtle brand mark -->
  <text x="16" y="17" font-family="Georgia, serif" font-size="5" font-weight="bold" fill="#8B4513" text-anchor="middle" opacity="0.25" letter-spacing="0">M</text>
</svg>
